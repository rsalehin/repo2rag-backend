<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repo2RAG – Codebase Q&A</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem; }
  .container { max-width:900px; width:100%; }
  h1 { font-size:2rem; margin-bottom:.25rem; color:#58a6ff; }
  .subtitle { color:#8b949e; margin-bottom:2rem; font-size:.95rem; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:1.5rem; margin-bottom:1.5rem; }
  .card h2 { font-size:1.1rem; margin-bottom:1rem; color:#f0f6fc; }
  .upload-zone { border:2px dashed #30363d; border-radius:8px; padding:2rem; text-align:center; cursor:pointer; transition:border-color .2s; }
  .upload-zone:hover { border-color:#58a6ff; }
  .upload-zone.drag-over { border-color:#3fb950; background:#0d2b1a; }
  .upload-zone.uploaded { border-color:#3fb950; background:#0d2b1a; }
  .upload-icon { font-size:2rem; margin-bottom:.5rem; }
  .upload-zone .file-name { color:#3fb950; font-weight:600; margin-top:.5rem; }
  .upload-zone input { display:none; }
  .ingest-status { margin-top:1rem; padding:.75rem; border-radius:6px; font-size:.9rem; display:none; }
  .ingest-status.success { display:block; background:#0d2b1a; color:#3fb950; border:1px solid #238636; }
  .ingest-status.error { display:block; background:#2b0d0d; color:#f85149; border:1px solid #da3633; }
  .search-row { display:flex; gap:.75rem; align-items:flex-end; }
  .search-row input[type="text"] { flex:1; padding:.6rem .8rem; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:1rem; }
  .search-row input[type="text"]:focus { border-color:#58a6ff; outline:none; }
  .search-row button { padding:.6rem 1.2rem; background:#238636; border:none; border-radius:6px; color:#fff; cursor:pointer; font-weight:600; font-size:.95rem; }
  .search-row button:hover { background:#2ea043; }
  .search-row button:disabled { background:#21262d; color:#484f58; cursor:not-allowed; }
  .topk-select { display:flex; align-items:center; gap:.5rem; color:#8b949e; font-size:.85rem; }
  .topk-select select { background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:.3rem .5rem; border-radius:4px; }
  .result { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:1.25rem; margin-bottom:1rem; }
  .result-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.75rem; flex-wrap:wrap; gap:.5rem; }
  .citation { color:#58a6ff; font-weight:600; font-size:.9rem; word-break:break-all; }
  .scores { display:flex; gap:.5rem; flex-wrap:wrap; }
  .badge { padding:.2rem .5rem; border-radius:12px; font-size:.75rem; font-weight:600; }
  .badge.rerank { background:#0d2b1a; color:#3fb950; }
  .badge.rrf { background:#1b1b2e; color:#bc8cff; }
  .badge.dense { background:#1b2e2b; color:#7ee787; }
  .badge.bm25 { background:#2e1b1b; color:#f0883e; }
  .content { line-height:1.6; white-space:pre-wrap; font-family:'Cascadia Code','Fira Code',monospace; font-size:.85rem; color:#e6edf3; max-height:300px; overflow-y:auto; background:#0d1117; padding:.75rem; border-radius:6px; }
  .empty-state { text-align:center; color:#484f58; padding:3rem; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation:spin .6s linear infinite; margin-right:.5rem; }
  @keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>
<div class="container">
  <h1> Repo2RAG</h1>
  <p class="subtitle">AI‑Optimized Codebase Q&A — Hybrid RAG + Cross‑Encoder Reranking</p>

  <!-- Upload card -->
  <div class="card">
    <h2>1. Upload Markdown Codebase</h2>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📄</div>
      <p>Drop your repo Markdown dump here or click to browse</p>
      <p style="font-size:.8rem;color:#8b949e;">.md files from repo2rag</p>
      <p class="file-name" id="fileName"></p>
      <input type="file" id="fileInput" accept=".md">
    </div>
    <div class="ingest-status" id="ingestStatus"></div>
  </div>

  <!-- Search card -->
  <div class="card">
    <h2>2. Ask a Question</h2>
    <div class="search-row">
      <input type="text" id="queryInput" placeholder="e.g. How does authentication work?" disabled>
      <div class="topk-select">
        Top-<select id="topK"><option>3</option><option selected>5</option><option>10</option><option>20</option></select>
      </div>
      <button id="searchBtn" disabled>🔍 Search</button>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsArea">
    <div class="empty-state">Upload a Markdown file to start asking questions</div>
  </div>
</div>

<script>
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileName  = document.getElementById('fileName');
const ingestStatus = document.getElementById('ingestStatus');
const queryInput = document.getElementById('queryInput');
const searchBtn  = document.getElementById('searchBtn');
const topKSelect = document.getElementById('topK');
const resultsArea = document.getElementById('resultsArea');

let uploaded = false;

// Upload zone events
uploadZone.addEventListener('click', ()=> fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', ()=> uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', ()=> {
  if(fileInput.files.length) handleFile(fileInput.files[0]);
});

async function handleFile(file) {
  if(!file.name.endsWith('.md')) {
    showStatus('Only .md files accepted', 'error');
    return;
  }
  fileName.textContent = file.name;
  uploadZone.classList.add('uploaded');
  showStatus('⌛ Ingesting...', 'success');

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch('/ingest', { method:'POST', body:form });
    const data = await res.json();
    if(res.ok) {
      showStatus(` Ingested – ${data.chunks} chunks ready`, 'success');
      uploaded = true;
      queryInput.disabled = false;
      searchBtn.disabled = false;
      queryInput.focus();
    } else {
      showStatus(data.detail || 'Ingestion failed', 'error');
    }
  } catch(err) {
    showStatus('Server unreachable. Is the API running?', 'error');
  }
}

function showStatus(msg, type) {
  ingestStatus.textContent = msg;
  ingestStatus.className = 'ingest-status ' + type;
}

// Search
searchBtn.addEventListener('click', doSearch);
queryInput.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

async function doSearch() {
  const q = queryInput.value.trim();
  if(!q || !uploaded) return;

  const topK = topKSelect.value;
  resultsArea.innerHTML = '<div class="empty-state"><span class="spinner"></span>Searching...</div>';

  try {
    const res = await fetch(`/search?q=${encodeURIComponent(q)}&top_k=${topK}`);
    const data = await res.json();
    renderResults(data.results, data.query);
  } catch(err) {
    resultsArea.innerHTML = '<div class="empty-state" style="color:#f85149;">Search failed</div>';
  }
}

function renderResults(results, query) {
  if(!results.length) {
    resultsArea.innerHTML = '<div class="empty-state">No results found</div>';
    return;
  }
  resultsArea.innerHTML = results.map((r,i) => `
    <div class="result">
      <div class="result-header">
        <div class="citation">${escapeHtml(r.citation)}</div>
        <div class="scores">
          <span class="badge rerank">Rerank ${r.rerank_score.toFixed(3)}</span>
          <span class="badge rrf">RRF ${r.rrf_score.toFixed(4)}</span>
          <span class="badge dense">Dense ${r.dense_score.toFixed(3)}</span>
          <span class="badge bm25">BM25 ${r.bm25_score.toFixed(3)}</span>
        </div>
      </div>
      <div class="content">${escapeHtml(r.content)}</div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
